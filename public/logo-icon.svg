<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="100" height="100" rx="22" fill="#0f172a"/>

  <!-- Bridge road base -->
  <rect x="12" y="66" width="76" height="6" rx="3" fill="#22c55e" opacity="0.9"/>

  <!-- Left tower -->
  <rect x="23" y="28" width="7" height="38" rx="2" fill="#22c55e"/>
  <!-- Right tower -->
  <rect x="70" y="28" width="7" height="38" rx="2" fill="#22c55e"/>

  <!-- Tower tops (small caps) -->
  <rect x="21" y="24" width="11" height="6" rx="2" fill="#22c55e"/>
  <rect x="68" y="24" width="11" height="6" rx="2" fill="#22c55e"/>

  <!-- Main suspension arc -->
  <path d="M 26 27 Q 50 10 74 27" stroke="#22c55e" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Hanging cables -->
  <line x1="36" y1="21.5" x2="36" y2="66" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <line x1="50" y1="16"   x2="50" y2="66" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <line x1="64" y1="21.5" x2="64" y2="66" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>

  <!-- Road dashes -->
  <rect x="44" y="67.5" width="12" height="3" rx="1.5" fill="#0f172a" opacity="0.7"/>
</svg>
