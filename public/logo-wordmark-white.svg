<svg viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif">

  <!-- Icon background -->
  <rect x="0" y="0" width="80" height="80" rx="18" fill="#0f172a"/>

  <!-- Bridge road base -->
  <rect x="9" y="53" width="62" height="5" rx="2.5" fill="#22c55e" opacity="0.9"/>

  <!-- Left tower -->
  <rect x="18" y="22" width="6" height="31" rx="1.5" fill="#22c55e"/>
  <!-- Right tower -->
  <rect x="56" y="22" width="6" height="31" rx="1.5" fill="#22c55e"/>

  <!-- Tower caps -->
  <rect x="16" y="18" width="10" height="5" rx="1.5" fill="#22c55e"/>
  <rect x="54" y="18" width="10" height="5" rx="1.5" fill="#22c55e"/>

  <!-- Main arc -->
  <path d="M 21 21 Q 40 8 59 21" stroke="#22c55e" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Hanging cables -->
  <line x1="29" y1="17" x2="29" y2="53" stroke="#22c55e" stroke-width="1.2" opacity="0.5"/>
  <line x1="40" y1="12" x2="40" y2="53" stroke="#22c55e" stroke-width="1.2" opacity="0.5"/>
  <line x1="51" y1="17" x2="51" y2="53" stroke="#22c55e" stroke-width="1.2" opacity="0.5"/>

  <!-- Road dash -->
  <rect x="35" y="54.5" width="10" height="2.5" rx="1.25" fill="#0f172a" opacity="0.7"/>

  <!-- Wordmark: CRUZA white -->
  <text x="96" y="50" font-size="38" font-weight="800" fill="#ffffff" letter-spacing="-1">Cruza</text>

  <!-- Tagline white -->
  <text x="97" y="66" font-size="13" font-weight="400" fill="#94a3b8" letter-spacing="0.3">Live border wait times</text>
</svg>
