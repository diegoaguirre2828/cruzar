name: iOS Build (TestFlight)

# Manual trigger for now. Once Apple Developer ID verification clears
# and we add the App Store Connect API key + signing cert secrets, this
# workflow will produce a signed .ipa and upload to TestFlight.
#
# Required secrets (add via repo Settings → Secrets and variables → Actions):
#   APP_STORE_CONNECT_API_KEY_ID
#   APP_STORE_CONNECT_API_ISSUER_ID
#   APP_STORE_CONNECT_API_KEY (base64-encoded .p8)
#   IOS_DIST_CERT (base64-encoded .p12)
#   IOS_DIST_CERT_PASSWORD
#   IOS_PROVISIONING_PROFILE (base64-encoded .mobileprovision)
#   IOS_KEYCHAIN_PASSWORD (any random string for the temp keychain)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - 'capacitor.config.ts'
      - '.github/workflows/ios-build.yml'

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Capacitor sync
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update

      - name: Import signing cert
        if: ${{ secrets.IOS_DIST_CERT != '' }}
        env:
          IOS_DIST_CERT: ${{ secrets.IOS_DIST_CERT }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          echo "$IOS_DIST_CERT" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$IOS_DIST_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$IOS_KEYCHAIN_PASSWORD" build.keychain

      - name: Install provisioning profile
        if: ${{ secrets.IOS_PROVISIONING_PROFILE != '' }}
        env:
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/cruzar.mobileprovision

      - name: Build archive
        if: ${{ secrets.IOS_DIST_CERT != '' }}
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}" \
            archive

      - name: Export .ipa
        if: ${{ secrets.IOS_DIST_CERT != '' }}
        run: |
          cd ios/App
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${{ secrets.IOS_TEAM_ID }}</string>
            <key>uploadBitcode</key><false/>
            <key>uploadSymbols</key><true/>
            <key>compileBitcode</key><false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload to TestFlight
        if: ${{ secrets.APP_STORE_CONNECT_API_KEY != '' }}
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          xcrun altool --upload-app \
            --type ios \
            --file ios/App/build/export/App.ipa \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"

      - name: Upload artifact (always, even unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: capacitor-ios-project
          path: ios/
          retention-days: 7
